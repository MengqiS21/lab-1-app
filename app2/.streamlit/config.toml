# GIX Wayfinder — light theme tuned for WCAG-style contrast (body text vs surfaces).
# Primary: white UI text on #0369A1 ≈ 4.9:1 (AA for normal text on controls).
# Body: #0f172a on #F8FAFC ≈ 15:1.
[theme]
base = "light"
primaryColor = "#0369A1"
backgroundColor = "#F8FAFC"
secondaryBackgroundColor = "#EEF2F6"
textColor = "#0F172A"
font = "sans serif"

[client]
toolbarMode = "minimal"
